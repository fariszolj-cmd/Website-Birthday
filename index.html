<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Happy Birthday Babygirl ❤️</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="sparkle-container" id="sparkleContainer"></div>
  <canvas id="confetti-canvas"></canvas>
  <div class="burst-overlay" id="burstOverlay">
    <div class="burst-text">HELL YEAH! ❤️</div>
  </div>

  <div class="container">
    <div class="card">

      <div id="screen-name">
        <h1>Hey you ❤️</h1>
        <p>Enter your name to unlock this</p>
        <input type="text" id="nameInput" placeholder="Your name..." autocomplete="off" />
        <p class="error-msg" id="errorMsg"></p>
        <button class="btn-primary" id="btnEnter">Let's go</button>
      </div>

      <div id="screen-choice" class="hidden">
        <h2>we fucking right? 😈</h2>
        <p>choose wisely...</p>
        <div class="choice-buttons">
          <button class="btn-yes" id="btnYes">HELL YEAH</button>
          <button class="btn-no" id="btnNo">naw</button>
        </div>
      </div>

      <div id="screen-celebration" class="hidden">
        <h1>Happy Birthday Babygirl! 🎂</h1>
        <p>but first lets celebrate this special day babygirl</p>
        <audio id="birthdaySong" src="Song.mp3" preload="auto"></audio>
        <div id="slideshow">
          <div id="slideshow-track"></div>
          <div id="slideshow-counter"></div>
          <span id="slideshow-prev">&#10094;</span>
          <span id="slideshow-next">&#10095;</span>
          <div id="slideshow-dots"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
