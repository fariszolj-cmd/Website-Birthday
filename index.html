<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Happy Birthday Babygirl ❤️</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="bg-ambient"></div>
  <div class="burst-overlay" id="burstOverlay">
    <div class="burst-text">HELL YEAH! ❤️</div>
  </div>

  <div class="container" id="app-container">
    <div class="card" id="app-card">

      <div id="screen-name">
        <h1>Hey you ❤️</h1>
        <p>Enter your name to unlock this</p>
        <input type="text" id="nameInput" placeholder="Your name..." autocomplete="off" />
        <p class="error-msg" id="errorMsg"></p>
        <button class="btn-primary" id="btnEnter">Let's go</button>
      </div>

      <div id="screen-choice" class="hidden">
        <h2>we fucking right? 😈</h2>
        <p>choose wisely...</p>
        <div class="choice-buttons">
          <button class="btn-yes" id="btnYes">HELL YEAH</button>
          <button class="btn-no" id="btnNo">naw</button>
        </div>
      </div>

      <div id="screen-celebration" class="hidden">
        <audio id="birthdaySong" src="Song.mp3" preload="auto"></audio>

        <div id="side-comments" aria-hidden="true"></div>

        <div id="memory-gallery">
          <div id="gallery-header">
            <p class="gallery-label">a day to remember</p>
            <h1>Happy Birthday Babygirl</h1>
            <p class="gallery-sub">another year spent in love with the same nigga i adore</p>
          </div>
          <div id="gallery-grid"></div>
        </div>

        <div id="viewer" class="hidden">
          <span id="viewer-close">&times;</span>
          <div id="viewer-content"></div>
          <div id="viewer-counter"></div>
        </div>
      </div>

    </div>
  </div>

  <div id="scroll-arrow">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
  </div>

  <script src="script.js"></script>
</body>
</html>
